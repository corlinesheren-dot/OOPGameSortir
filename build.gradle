plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

group = 'com.gamesortir'
version = '1.0-SNAPSHOT'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenCentral()
}

dependencies {
    // ===== JAVAFX DEPENDENCY =====
    implementation 'org.openjfx:javafx-controls:21'
    implementation 'org.openjfx:javafx-fxml:21'
    implementation 'org.openjfx:javafx-graphics:21'

    // ===== HIBERNATE & JPA DEPENDENCY =====
    implementation 'org.hibernate.orm:hibernate-core:6.3.1.Final'
    implementation 'org.hibernate.orm:hibernate-community-dialects:6.3.1.Final'
    implementation 'jakarta.persistence:jakarta.persistence-api:3.1.0'
    implementation 'jakarta.transaction:jakarta.transaction-api:2.0.1'

    // ===== SQLITE JDBC DRIVER =====
    implementation 'org.xerial:sqlite-jdbc:3.44.0.0'

    // ===== LOGGING DEPENDENCY =====
    implementation 'org.slf4j:slf4j-api:2.0.9'
    implementation 'org.slf4j:slf4j-simple:2.0.9'

    // ===== TESTING DEPENDENCY =====
    testImplementation 'junit:junit:4.13.2'
}

// ===== JAVAFX PLUGIN CONFIGURATION =====
javafx {
    version = "21"
    modules = ['javafx.controls', 'javafx.fxml', 'javafx.graphics']
}

// ===== APPLICATION MAIN CLASS =====
application {
    mainClass = 'com.gamesortir.app.GameSortirApp'
}

// ===== CUSTOM TASK UNTUK JALANKAN APLIKASI =====
task runApp(type: JavaExec) {
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.gamesortir.app.GameSortirApp'
    jvmArgs = [
        '--module-path', System.getProperty('user.home') + '/.gradle/caches/modules-2/files-2.1/org.openjfx/javafx-graphics/21/*/lib',
        '--add-modules', 'javafx.controls,javafx.fxml,javafx.graphics'
    ]
}

// ===== JAR BUILD CONFIGURATION =====
jar {
    manifest {
        attributes(
            'Main-Class': 'com.gamesortir.app.GameSortirApp',
            'Implementation-Title': 'GameSortir',
            'Implementation-Version': project.version
        )
    }
}
